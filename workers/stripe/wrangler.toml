name = "blackroad-stripe"
main = "index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# account_id is read from the CLOUDFLARE_ACCOUNT_ID environment variable

[vars]
ALLOWED_ORIGIN = "https://blackroad-brand-kit.pages.dev"
ENVIRONMENT = "production"

# Worker URL: https://blackroad-stripe.amundsonalexa.workers.dev
# Pages URL:  https://blackroad-brand-kit.pages.dev

# Secrets — set via: wrangler secret put STRIPE_SECRET_KEY
# STRIPE_SECRET_KEY        = "sk_live_..."   ← set with: wrangler secret put STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET    = "whsec_..."     ← set with: wrangler secret put STRIPE_WEBHOOK_SECRET
# WEBHOOK_FORWARD_URL      = "https://..."   ← optional: POST all events to your backend
# WEBHOOK_FORWARD_SECRET   = "..."           ← optional: Authorization Bearer token for forwarded requests

[triggers]
crons = []
