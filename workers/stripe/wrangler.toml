name = "blackroad-stripe"
main = "index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# account_id — set via CLOUDFLARE_ACCOUNT_ID environment variable or wrangler config

[vars]
ALLOWED_ORIGIN = "https://blackroad-brand-kit.pages.dev"
ENVIRONMENT = "production"

# Worker URL: https://blackroad-stripe.amundsonalexa.workers.dev
# Pages URL:  https://blackroad-brand-kit.pages.dev

# Secrets — set via: wrangler secret put STRIPE_SECRET_KEY
