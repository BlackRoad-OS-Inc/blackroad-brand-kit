name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Brand Validation & Lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate brand colors
        run: node scripts/brand-validator.js --dir=.

      - name: Lint HTML templates
        run: |
          echo "=== Checking template files exist ==="
          TEMPLATES=(
            templates/landing/index.html
            templates/pricing/index.html
            templates/docs/getting-started.html
            templates/404/index.html
            templates/agent/lucidia.html
            templates/blog/index.html
            templates/feature/index.html
          )
          MISSING=0
          for tpl in "${TEMPLATES[@]}"; do
            if [ -f "$tpl" ]; then
              echo "  ✓ $tpl"
            else
              echo "  ✗ $tpl (missing)"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "⚠️  $MISSING template(s) missing"
          else
            echo "✅ All template files present"
          fi

      - name: Validate brand.css
        run: |
          echo "=== Checking brand.css design tokens ==="
          TOKENS=(
            "--sunrise-orange"
            "--hot-pink"
            "--deep-magenta"
            "--cyber-blue"
            "--gradient-brand"
            "--space-xs"
            "--space-sm"
            "--space-md"
            "--space-lg"
            "--space-xl"
            "--phi"
          )
          PASS=true
          for token in "${TOKENS[@]}"; do
            if grep -q "$token" css/brand.css; then
              echo "  ✓ $token"
            else
              echo "  ✗ $token (missing)"
              PASS=false
            fi
          done
          if [ "$PASS" = true ]; then
            echo "✅ All design tokens present"
          else
            echo "❌ Missing design tokens"
            exit 1
          fi

      - name: Check br-brand.sh syntax
        run: |
          sudo apt-get install -y -qq zsh
          zsh -n br-brand.sh && echo "✅ br-brand.sh syntax OK" || (echo "❌ br-brand.sh has syntax errors" && exit 1)

      - name: Verify no hardcoded secrets
        run: |
          echo "=== Scanning for hardcoded secrets ==="
          FOUND=0
          # Check for hardcoded API keys (sk_live_, sk_test_, whsec_)
          if grep -rn 'sk_live_[a-zA-Z0-9]' --include='*.js' --include='*.sh' --include='*.yml' --include='*.toml' . 2>/dev/null | grep -v 'sk_live_\.\.\.' | grep -v '#.*sk_live_'; then
            echo "⚠️  Found potential hardcoded Stripe live key"
            FOUND=$((FOUND + 1))
          fi
          if grep -rn 'sk_test_[a-zA-Z0-9]\{10,\}' --include='*.js' --include='*.sh' --include='*.yml' --include='*.toml' . 2>/dev/null; then
            echo "⚠️  Found potential hardcoded Stripe test key"
            FOUND=$((FOUND + 1))
          fi
          if [ "$FOUND" -eq 0 ]; then
            echo "✅ No hardcoded secrets found"
          fi
