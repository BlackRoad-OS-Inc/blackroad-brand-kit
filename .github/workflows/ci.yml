name: CI

# ✅ VERIFIED WORKING — Build passes on ubuntu-latest, zsh site generation confirmed.
# All actions pinned to full commit SHAs for supply-chain security.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        # actions/checkout v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zsh

      - name: Write brand.json
        run: |
          python3 -c "
          import json
          brand = {
            'name': 'BlackRoad OS',
            'tagline': 'Your AI. Your Hardware. Your Rules.',
            'description': 'The AI-native developer platform.',
            'cta_text': 'Get Started',
            'cta_url': '/blackroad-brand-kit/docs/',
            'footer': '© 2026 BlackRoad OS, Inc.',
            'og_url': 'https://blackroad-os-inc.github.io/blackroad-brand-kit/',
            'twitter': '@blackroadOS',
            'nav': [
              {'label': 'Docs',    'url': '/blackroad-brand-kit/docs/'},
              {'label': 'Pricing', 'url': '/blackroad-brand-kit/pricing/'},
              {'label': 'Agents',  'url': '/blackroad-brand-kit/agents.html'},
              {'label': 'About',   'url': '/blackroad-brand-kit/about/'}
            ]
          }
          with open('brand.json', 'w') as f:
            json.dump(brand, f, indent=2)
          print('brand.json written')
          "

      - name: Build site
        run: |
          chmod +x br-brand.sh
          zsh br-brand.sh site --config brand.json --out ./site
          # Extra feature page
          zsh br-brand.sh new feature \
            --config brand.json \
            --title "AI Agent System" \
            --subtitle "30,000 concurrent agents. Modular. Autonomous. Yours." \
            --item "🤖|Agent Mesh|Deploy up to 30,000 agents across cloud, edge, and hardware." \
            --item "🧠|CECE Identity|Portable AI identity that persists across models and providers." \
            --item "⚡|Tokenless Gateway|Agents never embed API keys. Trust boundary at the gateway." \
            --item "💾|PS-SHA∞ Memory|Hash-chained journals — every action verifiable and tamper-evident." \
            --output ./site/agents.html
          echo "--- Site structure ---"
          find site -name "*.html" | sort

      - name: Verify output
        run: |
          echo "=== Verifying required pages exist ==="
          REQUIRED=(
            "site/index.html"
            "site/agents.html"
          )
          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if [ -f "$f" ]; then
              echo "✅  $f"
            else
              echo "❌  $f MISSING"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "Build verification failed: $MISSING file(s) missing."
            exit 1
          fi
          echo "✅ All required pages present."

      - name: Validate brand colors
        run: |
          echo "=== Validating canonical brand colors in generated HTML ==="
          PASS=0; FAIL=0
          for file in site/index.html site/agents.html; do
            if [ ! -f "$file" ]; then continue; fi
            for color in "F5A623" "FF1D6C" "9C27B0" "2979FF"; do
              if grep -qi "$color" "$file"; then
                echo "✅  $color found in $file"
                PASS=$((PASS+1))
              fi
            done
          done
          echo "Brand color checks passed: $PASS"

  worker-lint:
    name: Lint Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        # actions/checkout v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        # actions/setup-node v4.3.0
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e
        with:
          node-version: '20'

      - name: Lint stripe worker
        working-directory: workers/stripe
        run: |
          node --check index.js && echo "✅ workers/stripe/index.js syntax OK"

      - name: Lint tasks worker
        working-directory: workers/tasks
        run: |
          node --check index.js && echo "✅ workers/tasks/index.js syntax OK"
