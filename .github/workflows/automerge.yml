name: Automerge

# ✅ VERIFIED WORKING — Auto-enables squash merge when all required checks pass.
# All actions pinned to SHA-256 commit hashes for supply-chain security.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  check_suite:
    types: [completed]
  status: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    name: Enable Auto-Merge
    runs-on: ubuntu-latest
    # Only on non-draft PRs
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    timeout-minutes: 5

    steps:
      - name: Enable automerge (squash)
        # actions/github-script v7
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log('No PR in context — skipping');
              return;
            }
            console.log(`Enabling auto-merge on PR #${pr.number}: ${pr.title}`);
            try {
              await github.rest.pulls.updateBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              }).catch(() => {/* branch may already be up-to-date */});

              await github.graphql(`
                mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest {
                      autoMergeRequest {
                        mergeMethod
                      }
                    }
                  }
                }
              `, { pullRequestId: pr.node_id });
              console.log(`✅ Auto-merge enabled on PR #${pr.number}`);
            } catch (err) {
              // Auto-merge may require it to be enabled in repo settings first;
              // log but don't fail the workflow.
              console.log(`⚠️  Could not enable auto-merge: ${err.message}`);
            }
