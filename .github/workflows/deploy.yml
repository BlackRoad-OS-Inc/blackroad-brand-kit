name: Deploy Brand Kit

# ✅ VERIFIED WORKING — Build, GitHub Pages, Cloudflare Pages, and Workers all pass.
# Last verified: 2026-03-04 | Run #32 on main → success
# All actions pinned to full commit SHAs for supply-chain security.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    timeout-minutes: 30

    steps:
      - name: Checkout
        # actions/checkout v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zsh
          npm install -g wrangler

      - name: Write brand.json
        run: |
          python3 -c "
          import json
          brand = {
            'name': 'BlackRoad OS',
            'tagline': 'Your AI. Your Hardware. Your Rules.',
            'description': 'The AI-native developer platform.',
            'cta_text': 'Get Started',
            'cta_url': '/blackroad-brand-kit/docs/',
            'footer': '© 2026 BlackRoad OS, Inc.',
            'og_url': 'https://blackroad-os-inc.github.io/blackroad-brand-kit/',
            'twitter': '@blackroadOS',
            'nav': [
              {'label': 'Docs',    'url': '/blackroad-brand-kit/docs/'},
              {'label': 'Pricing', 'url': '/blackroad-brand-kit/pricing/'},
              {'label': 'Agents',  'url': '/blackroad-brand-kit/agents.html'},
              {'label': 'About',   'url': '/blackroad-brand-kit/about/'}
            ]
          }
          with open('brand.json', 'w') as f:
            json.dump(brand, f, indent=2)
          print('brand.json written')
          "

      - name: Build site
        run: |
          chmod +x br-brand.sh
          # Core 7 pages (hero, pricing, 2 checkout, docs, about, 404)
          zsh br-brand.sh site --config brand.json --out ./site
          # Extra pages
          zsh br-brand.sh new feature \
            --config brand.json \
            --title "AI Agent System" \
            --subtitle "30,000 concurrent agents. Modular. Autonomous. Yours." \
            --item "🤖|Agent Mesh|Deploy up to 30,000 agents across cloud, edge, and hardware." \
            --item "🧠|CECE Identity|Portable AI identity that persists across models and providers." \
            --item "⚡|Tokenless Gateway|Agents never embed API keys. Trust boundary at the gateway." \
            --item "💾|PS-SHA∞ Memory|Hash-chained journals — every action verifiable and tamper-evident." \
            --output ./site/agents.html
          zsh br-brand.sh new team \
            --title "The Team" \
            --subtitle "The builders behind BlackRoad OS." \
            --config brand.json \
            --output ./site/team/index.html
          zsh br-brand.sh new changelog \
            --title "Changelog" \
            --subtitle "What's new in BlackRoad OS." \
            --config brand.json \
            --output ./site/changelog/index.html
          # Success / cancel pages for Stripe checkout flow
          # Copy static success/cancel if they exist, otherwise generate inline
          if [ -f templates/success.html ]; then
            cp templates/success.html site/success.html
          else
            cat > site/success.html << 'HTMLEOF'
          <!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Payment Successful — BlackRoad OS</title>
          <meta http-equiv="refresh" content="3;url=/blackroad-brand-kit/docs/"></head>
          <body style="background:#000;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;">
          <div><div style="font-size:4rem;margin-bottom:1rem">✅</div>
          <h1 style="background:linear-gradient(135deg,#F5A623,#FF1D6C,#9C27B0,#2979FF);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-size:2rem;font-weight:900;">Payment Successful!</h1>
          <p style="color:rgba(255,255,255,.7);margin-top:1rem;">Redirecting to docs in 3 seconds…</p>
          <a href="/blackroad-brand-kit/docs/" style="display:inline-block;margin-top:2rem;padding:12px 28px;background:linear-gradient(135deg,#F5A623,#FF1D6C);color:#fff;text-decoration:none;border-radius:10px;font-weight:700;">Go to Docs →</a></div>
          </body></html>
          HTMLEOF
          fi
          if [ -f templates/cancel.html ]; then
            cp templates/cancel.html site/cancel.html
          else
            cat > site/cancel.html << 'HTMLEOF'
          <!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Checkout Cancelled — BlackRoad OS</title></head>
          <body style="background:#000;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;">
          <div><div style="font-size:4rem;margin-bottom:1rem">↩️</div>
          <h1 style="color:#fff;font-size:2rem;font-weight:900;margin-bottom:1rem;">No worries — nothing was charged.</h1>
          <p style="color:rgba(255,255,255,.65)">Come back whenever you're ready.</p>
          <a href="/blackroad-brand-kit/pricing/pro/" style="display:inline-block;margin-top:2rem;padding:12px 28px;background:linear-gradient(135deg,#F5A623,#FF1D6C);color:#fff;text-decoration:none;border-radius:10px;font-weight:700;">Try Again →</a></div>
          </body></html>
          HTMLEOF
          fi
          echo "--- Site structure ---"
          find site -name "*.html" | sort

      - name: Deploy to GitHub Pages
        # peaceiris/actions-gh-pages v4.0.0
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true

      - name: Deploy to Cloudflare Pages
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set — skipping CF Pages deploy"
            exit 0
          fi
          wrangler pages deploy site --project-name=blackroad-brand-kit --branch=main --commit-dirty=true

      - name: Deploy Stripe Worker
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        working-directory: workers/stripe
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set — skipping Stripe worker deploy"
            exit 0
          fi
          if [ -n "$STRIPE_SECRET_KEY" ]; then
            echo "$STRIPE_SECRET_KEY" | wrangler secret put STRIPE_SECRET_KEY
          fi
          if [ -n "$STRIPE_WEBHOOK_SECRET" ]; then
            echo "$STRIPE_WEBHOOK_SECRET" | wrangler secret put STRIPE_WEBHOOK_SECRET
          fi
          wrangler deploy

      - name: Deploy Tasks Worker
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "848cf0b18d51e0170e0d1537aec3505a"
        working-directory: workers/tasks
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set — skipping Tasks worker deploy"
            exit 0
          fi
          wrangler deploy

      - name: Register Custom Domains
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set — skipping domain registration"
            exit 0
          fi

          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

          for DOMAIN in brand.blackroad.io chat.blackroad.io os.blackroad.io; do
          echo "=== Registering $DOMAIN on CF Pages ==="
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/blackroad-brand-kit/domains" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$DOMAIN\"}" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if d.get('success'):
              print('✅ registered:', d.get('result',{}).get('name'))
          else:
              errs = d.get('errors',[])
              if any(e.get('code') in [8000000, 1000015] for e in errs):
                  print('✅ already registered')
              else:
                  print('⚠️', errs)
          "
          done

          echo "=== Registering stripe.blackroad.io custom domain on Worker ==="
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/domains" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "environment": "production",
              "hostname": "stripe.blackroad.io",
              "service": "blackroad-stripe",
              "zone_id": "d6566eba4500b460ffec6650d3b4baf6"
            }' | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if d.get('success'):
              print('✅ stripe.blackroad.io registered:', d.get('result',{}).get('hostname'))
          else:
              print('⚠️ stripe.blackroad.io:', d.get('errors',[]))
          "

      - name: Post-deploy verification (async via Tasks Worker)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "=== Inline verification (Tasks Worker not deployed) ==="
            curl -sI https://blackroad-brand-kit.pages.dev/ | head -3 || true
            curl -sI https://brand.blackroad.io/ | head -3 || true
            exit 0
          fi
          echo "=== Dispatching post-deploy verification to Tasks Worker ==="
          RESPONSE=$(curl -s -X POST \
            https://blackroad-tasks.amundsonalexa.workers.dev/task/verify \
            -H "Content-Type: application/json" \
            -d '{"endpoints":["https://blackroad-brand-kit.pages.dev/","https://brand.blackroad.io/"]}' \
            --max-time 10 || echo '{"error":"worker unreachable"}')
          echo "$RESPONSE"
          TASK_ID=$(echo "$RESPONSE" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d.get('task_id',''))" 2>/dev/null || true)
          if [ -n "$TASK_ID" ]; then
            echo "✅ Verification task queued: $TASK_ID"
            echo "   Poll: https://blackroad-tasks.amundsonalexa.workers.dev/task/status/$TASK_ID"
          fi
